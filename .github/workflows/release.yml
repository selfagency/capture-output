name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, without leading v)'
        required: true
        default: '0.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Create Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate changelog
        id: generate_changelog
        run: |
          git fetch --tags
          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$prev_tag" ]; then
            range="HEAD"
          else
            range="$prev_tag..HEAD"
          fi
          changelog=$(git log $range --pretty=format:'- %s (%h)')
          if [ -z "$changelog" ]; then
            changelog="No notable changes"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit built dist and tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Validate strict semver (X.Y.Z) before using the value in any command
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version '${VERSION}' is not valid semver (expected X.Y.Z)" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          MAJOR_TAG="v$(echo "$VERSION" | cut -d. -f1)"

          # Stage the bundled artifact (force-add since dist/ is gitignored)
          git add --force dist/action.js
          git commit -m "chore: release ${TAG} [skip ci]"

          # Create the versioned annotated tag on this commit
          git tag -a "$TAG" -m "Release ${TAG}"

          # Move the floating major tag (e.g. v2) to this commit
          git tag -fa "$MAJOR_TAG" -m "Release ${TAG}"

          # Push tags only — dist/action.js is carried with the tag commit objects;
          # main is intentionally left unchanged so dist/ stays gitignored there.
          git push origin "$TAG"
          git push origin "$MAJOR_TAG" --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ inputs.version }}'
          name: 'v${{ inputs.version }}'
          body: ${{ steps.generate_changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
